</head>
<body>
    <div class="header">
        <h2>Лог обучения модели</h2>
        <p><a href="{{ url_for('admin_dashboard') }}">Назад</a> | <a href="{{ url_for('logout') }}">Выйти</a></p>
    </div>

    <div class="content">
        <h3>История обучения</h3>
        
        {% if log_content %}
            <pre style="background: #2c3e50; color: #ecf0f1; padding: 20px; border-radius: 10px; overflow-x: auto; font-family: monospace; font-size: 14px; line-height: 1.5;">

                <p>Для запуска обучения выполните:</p>
                <code style="background: #eee; padding: 10px; display: inline-block; margin: 10px;">
                    python train_model.py
                </code>
            </div>
        {% endif %}
    </div>
